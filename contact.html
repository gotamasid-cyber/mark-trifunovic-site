<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Mark Trifunovic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="nav" class="scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">MT</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="films.html">Films</a></li>
        <li><a href="othercreations.html">Other</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="contact-layout">
    <h1>Contact</h1>
    <p class="contact-tagline">Let's talk ideas</p>

    <div class="contact-info">
      <p><a href="tel:+16479916275">(+1) 647-991-6275</a></p>
      <p><a href="mailto:mdtrifunovic@gmail.com">mdtrifunovic@gmail.com</a></p>
    </div>

    <div class="contact-form-section">
      <form action="#" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell me about your project" required></textarea>

        <button type="submit" class="contact-submit">Send Message</button>
      </form>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-name">Mark Trifunovic</div>
      <div class="footer-links">
        <a href="films.html">Films</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-copy">&copy; 2024</div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });
  </script>
</body>
</html>
